<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <!-- 폰 세로화면 우선: 뷰포트 고정, 확대 방지 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0e1117" />
  <title>비트코인 가격알림</title>
  <!-- PWA manifest 연결 -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="아이콘/아이콘-192.png" />
  <link rel="apple-touch-icon" href="아이콘/아이콘-192.png" />
  <!-- 다크 테마 스타일시트 -->
  <link rel="stylesheet" href="화면.css" />
</head>
<body>
  <!-- 앱 셸: 폰 세로 한 화면 레이아웃 -->
  <main class="앱">
    <header class="상단">
      <span class="로고">₿</span>
      <h1 class="제목">비트코인 가격알림</h1>
      <!-- 연결상태 점: 색으로 연결/재연결/끊김 표시 -->
      <span id="연결상태" class="상태점" data-상태="대기" title="연결 상태">●</span>
    </header>

    <section class="가격영역">
      <p class="라벨">현재가 (BTC/USDT)</p>
      <!-- 큰 현재가 -->
      <div id="현재가" class="현재가">—</div>
      <!-- 다음 알림 경계 표시 (ON 누른 기준점 ±$300) -->
      <p id="다음경계라벨" class="다음경계라벨">다음 알림 경계</p>
      <div id="다음경계" class="다음경계">ON을 누르면 시작</div>
    </section>

    <footer class="하단">
      <!-- 알림 ON/OFF 토글 버튼 -->
      <button id="알림권한버튼" class="알림버튼" type="button">▶ 알림 ON</button>
      <p id="안내" class="안내">ON을 누른 순간 가격에서 $300 움직이면 알려드려요</p>
    </footer>
  </main>

  <!-- 모듈 로드 순서: 가격엔진 → 알림기 → 글루(앱.js).
       가격엔진.js / 알림기.js 는 다른 에이전트 담당이라 여기서 로드만 한다. -->
  <script src="가격엔진.js"></script>
  <script src="알림기.js"></script>
  <script src="앱.js"></script>
  <script>
    // 서비스워커 등록 (PWA 설치/오프라인 셸)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('서비스워커.js').catch(function (e) {
          console.warn('서비스워커 등록 실패:', e);
        });
      });
    }
  </script>
</body>
</html>
