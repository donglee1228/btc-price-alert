<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <!-- 폰 세로화면 우선: 뷰포트 고정, 확대 방지 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0e1117" />
  <title>코인 가격알림</title>
  <!-- PWA manifest 연결 -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="아이콘/아이콘-192.png" />
  <link rel="apple-touch-icon" href="아이콘/아이콘-192.png" />
  <!-- 다크 테마 스타일시트 -->
  <link rel="stylesheet" href="화면.css" />
</head>
<body>
  <!-- 앱 셸: 폰 세로 한 화면 레이아웃 -->
  <main class="앱">
    <header class="상단">
      <span class="로고">₿</span>
      <h1 class="제목">코인 가격알림</h1>
      <!-- 연결상태 점: 색으로 연결/재연결/끊김 표시 -->
      <span id="연결상태" class="상태점" data-상태="대기" title="연결 상태">●</span>
    </header>

    <section class="코인목록">
      <!-- 비트코인: $500 단위 알림 대상 -->
      <article class="코인카드 주코인">
        <div class="코인머리">
          <span class="코인명">비트코인</span>
          <span class="코인뱃지 알림뱃지">$500 알림</span>
        </div>
        <div id="현재가-비트코인" class="현재가">—</div>
        <p class="다음경계라벨">다음 알림 경계</p>
        <div id="다음경계-비트코인" class="다음경계">ON을 누르면 시작</div>
      </article>

      <!-- 이더리움: 표시 전용(알림 없음) -->
      <article class="코인카드 보조코인">
        <div class="코인머리">
          <span class="코인명">이더리움</span>
          <span class="코인뱃지 참고뱃지">표시 전용 · 알림 없음</span>
        </div>
        <div id="현재가-이더리움" class="현재가 보조현재가">—</div>
      </article>
    </section>

    <footer class="하단">
      <!-- 알림 ON/OFF 토글 버튼 (비트코인 대상) -->
      <button id="알림권한버튼" class="알림버튼" type="button">▶ 비트코인 알림 ON</button>
      <p id="안내" class="안내">ON을 누른 순간 비트코인 가격에서 $500 움직이면 알려드려요</p>
    </footer>
  </main>

  <!-- 모듈 로드 순서: 가격엔진 → 알림기 → 글루(앱.js).
       가격엔진.js / 알림기.js 는 다른 에이전트 담당이라 여기서 로드만 한다. -->
  <script src="가격엔진.js"></script>
  <script src="알림기.js"></script>
  <script src="앱.js"></script>
  <script>
    // 서비스워커 등록 (PWA 설치/오프라인 셸)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('서비스워커.js').catch(function (e) {
          console.warn('서비스워커 등록 실패:', e);
        });
      });
    }
  </script>
</body>
</html>
